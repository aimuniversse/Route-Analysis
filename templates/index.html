<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Analysis Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-dark: #050505;
            --glass-bg: rgba(20, 20, 25, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-1: #6366f1; /* Indigo */
            --accent-2: #a855f7; /* Purple */
            --accent-3: #ec4899; /* Pink */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient Background Glows */
        body::before, body::after {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.4;
            animation: float 20s infinite alternate ease-in-out;
        }

        body::before {
            background: var(--accent-1);
            top: -200px;
            left: -200px;
        }

        body::after {
            background: var(--accent-3);
            bottom: -200px;
            right: -200px;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(100px, 50px) scale(1.2); }
            100% { transform: translate(-50px, 100px) scale(0.8); }
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 1s ease-out;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.2rem;
            font-weight: 300;
        }

        .search-container {
            display: flex;
            gap: 1rem;
            width: 100%;
            max-width: 800px;
            margin-bottom: 3rem;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 0.75rem;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 1s ease-out 0.2s both;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .search-container:focus-within {
            transform: translateY(-2px);
            box-shadow: 0 30px 60px -12px rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.3);
        }

        input {
            flex: 1;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            background: transparent;
            border: none;
            color: var(--text-main);
            outline: none;
        }

        input::placeholder {
            color: #64748b;
        }

        button {
            padding: 0.75rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px -10px var(--accent-1);
        }

        button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.5s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -10px var(--accent-1);
        }

        button:hover::before {
            left: 100%;
        }

        button:disabled {
            background: #334155;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loader-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            margin: 4rem 0;
            animation: fadeIn 0.5s ease-out;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--accent-2);
            animation: spin 1s ease-in-out infinite;
        }

        .loader-text {
            color: var(--accent-2);
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.9rem;
            animation: pulseText 2s infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulseText {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .error-msg {
            color: #fca5a5;
            background: rgba(127, 29, 29, 0.2);
            border: 1px solid rgba(248, 113, 113, 0.3);
            padding: 1.25rem 2rem;
            border-radius: 12px;
            margin-top: 1rem;
            display: none;
            text-align: center;
            width: 100%;
            max-width: 800px;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.3s ease-out;
        }

        .results-container {
            display: none;
            width: 100%;
            max-width: 900px;
            margin-top: 2rem;
            animation: slideUp 0.6s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .report-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 3.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .report-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-3));
        }

        /* Prose / Markdown Styling */
        .prose {
            line-height: 1.8;
            color: #e2e8f0;
            font-size: 1.1rem;
        }

        .prose h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
            text-align: center;
        }

        .prose h2 {
            font-size: 1.5rem;
            color: #fff;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .prose h2::before {
            content: '';
            display: block;
            width: 24px;
            height: 4px;
            background: var(--accent-2);
            border-radius: 2px;
        }

        .prose h3 {
            font-size: 1.25rem;
            color: #94a3b8;
            margin-top: 1.5rem;
        }

        .prose p { margin-bottom: 1.25rem; }
        
        .prose strong {
            color: #fff;
            font-weight: 600;
            background: rgba(255,255,255,0.05);
            padding: 0.1em 0.3em;
            border-radius: 4px;
        }

        .prose ul, .prose ol {
            margin-bottom: 1.5rem;
            padding-left: 1.5rem;
        }

        .prose li { margin-bottom: 0.5rem; }
        .prose li::marker { color: var(--accent-2); }

        .prose table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin: 2rem 0;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }

        .prose th, .prose td {
            padding: 1rem 1.25rem;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }

        .prose th {
            background: rgba(255,255,255,0.05);
            font-weight: 600;
            color: #fff;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .prose tr:last-child td { border-bottom: none; }
        .prose tr:hover td { background: rgba(255,255,255,0.02); }

        .copy-btn-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1.5rem;
        }

        .copy-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 0.6rem 1.25rem;
            font-size: 0.9rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-1px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 { font-size: 2.5rem; }
            .report-card { padding: 2rem; }
            .search-container { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Route Intelligence</h1>
        <p>AI-Powered Demographic & Transport Analytics</p>
    </div>

    <div class="search-container">
        <input type="text" id="routeInput" placeholder="Enter route (e.g., Delhi to Agra)" autocomplete="off" />
        <button id="searchBtn">Analyze Route</button>
    </div>

    <div class="loader-container" id="loader">
        <div class="loader"></div>
        <div class="loader-text">Analyzing Route Data...</div>
    </div>
    
    <div class="error-msg" id="errorMsg"></div>

    <div class="results-container" id="resultsContainer">
        <!-- Results injected here -->
    </div>

    <script>
        document.getElementById('searchBtn').addEventListener('click', analyzeRoute);
        document.getElementById('routeInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') analyzeRoute();
        });

        async function analyzeRoute() {
            const query = document.getElementById('routeInput').value.trim();
            if (!query) return;

            const container = document.getElementById('resultsContainer');
            const loader = document.getElementById('loader');
            const errorMsg = document.getElementById('errorMsg');
            const searchBtn = document.getElementById('searchBtn');

            container.style.display = 'none';
            container.innerHTML = '';
            errorMsg.style.display = 'none';
            loader.style.display = 'flex';
            searchBtn.disabled = true;
            searchBtn.innerHTML = 'Processing...';

            try {
                // Connect frontend with backend correctly via the /testing/ endpoint
                const response = await fetch(`/testing/?route=${encodeURIComponent(query)}`);
                const result = await response.json();

                if (result.error) {
                    throw new Error(result.error);
                }

                renderResults(result.data);

            } catch (err) {
                errorMsg.textContent = "Analysis Failed: " + err.message;
                errorMsg.style.display = 'block';
            } finally {
                loader.style.display = 'none';
                searchBtn.disabled = false;
                searchBtn.innerHTML = 'Analyze Route';
            }
        }

        function renderResults(data) {
            if (!data) return;
            const container = document.getElementById('resultsContainer');
            
            // Format text for markdown
            let processedData = data.replace(/^(\d+\.\s+.*)$/gm, '## $1');
            processedData = processedData.replace(/^(ROUTE NAME:.*)$/m, '# $1');

            const htmlContent = marked.parse(processedData);

            container.innerHTML = `
                <div class="copy-btn-container">
                    <button class="copy-btn" onclick="copyRawText()">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        Copy Report
                    </button>
                </div>
                <div class="report-card prose">
                    ${htmlContent}
                </div>
            `;
            
            window.rawLLMText = data;
            container.style.display = 'block';
            
            // Smooth scroll to results
            setTimeout(() => {
                container.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }
        
        function copyRawText() {
            if (window.rawLLMText) {
                navigator.clipboard.writeText(window.rawLLMText).then(() => {
                    const btn = document.querySelector('.copy-btn');
                    const originalHtml = btn.innerHTML;
                    btn.innerHTML = '<svg width="16" height="16" fill="none" stroke="#4ade80" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg> Copied!';
                    btn.style.color = '#4ade80';
                    btn.style.borderColor = '#4ade80';
                    
                    setTimeout(() => {
                        btn.innerHTML = originalHtml;
                        btn.style.color = '';
                        btn.style.borderColor = '';
                    }, 2000);
                });
            }
        }
    </script>
</body>
</html>
